name: Publish Docker Image
 
on:
  push:
    branches:
      - main
  workflow_dispatch:
 
concurrency:
  group: docker-image-${{ github.ref }}
  cancel-in-progress: true
 
env:
  IMAGE_NAME: ghcr.io/wslzgmzs/webdataapiproxymanager
 
jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
 
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
 
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0
 
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
 
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          flavor: |
            latest=false
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=snapshot-{{date 'YYYYMMDD-HHmmss'}}-{{sha}}
          labels: |
            org.opencontainers.image.title=Web Data Api Proxy Manager
            org.opencontainers.image.description=Unified proxy manager for web data provider APIs
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.source=https://github.com/WslzGmzs/WebDataApiProxyManager
 
      - name: Build and push Docker image
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          file: ./Dockerfile
          pull: true
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
